# 6 band sink equalizer
#
# Copy this file into a conf.d/ directory such as
# ~/.config/pipewire/filter-chain.conf.d/
#
context.modules = [
    {name = libpipewire-module-filter-chain
        args = {
            node.description = "CX-300-II EQ"
            media.name       = "CX-300-II EQ"
            filter.graph = {
                nodes = [
                     {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_lowshelf
                        control = { "Freq" = 105 "Q" = 0.7 "Gain" = 2.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 181 "Q" = 0.46 "Gain" = -6.1 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 2546 "Q" = 0.64 "Gain" = 6.4 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 6117 "Q" = 4.42 "Gain" = -8.4 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 9688 "Q" = 6 "Gain" = 2.1 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                ]
            }
            capture.props = {
                node.name   = "effect_input.eq"
                media.class = Audio/Sink
				audio.channels = 2
				audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "effect_output.eq"
				node.passive = false
				audio.channels = 2
				audio.position = [ FL FR ]
            }
        }
    }
]
