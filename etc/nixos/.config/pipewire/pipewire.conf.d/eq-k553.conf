# 6 band sink equalizer
#
# Copy this file into a conf.d/ directory such as
# ~/.config/pipewire/filter-chain.conf.d/
#
context.modules = [
    {name = libpipewire-module-filter-chain
        args = {
            node.description = "K553 EQ"
            media.name       = "K553 EQ"
            filter.graph = {
                nodes = [
                    {
                        type = builtin
                        name = pregain
                        label = bq_allpass
                        control = { "Gain" = -10}
                    }
                     {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_highpass
                        control = { "Freq" = 15 "Q" = 1 }
                    }
                     {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_lowshelf
                        control = { "Freq" = 105 "Q" = 0.7 "Gain" = 3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 66 "Q" = 2.9 "Gain" = 5.1 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 111 "Q" = 2 "Gain" = -5.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 1748 "Q" = 1.27 "Gain" = 2.1 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_6
                        label = bq_peaking
                        control = { "Freq" = 1600 "Q" = 2 "Gain" = 2.3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_7
                        label = bq_peaking
                        control = { "Freq" = 3809 "Q" = 3.75 "Gain" = 5.2 }
                    }
                ]
                links = [
                    { output = "pregain:Out"   input = "eq_band_1:In" }
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                    { output = "eq_band_6:Out" input = "eq_band_7:In" }
                ]
            }
            capture.props = {
				node.name   = "effect_input.eq"
				media.class = Audio/Sink
				audio.channels = 2
				audio.position = [ FL FR ]
			}
            playback.props = {
                node.name   = "effect_output.eq"
				node.passive = false
				audio.channels = 2
				audio.position = [ FL FR ]
            }
        }
    }
]
