# 6 band sink equalizer
#
# Copy this file into a conf.d/ directory such as
# ~/.config/pipewire/filter-chain.conf.d/
#
context.modules = [
    {name = libpipewire-module-filter-chain
        args = {
            node.description = "K371 EQ"
            media.name       = "K371 EQ"
            filter.graph = {
                nodes = [
                     {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_lowshelf
                        control = { "Freq" = 105 "Q" = 0.7 "Gain" = -2.7 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 67 "Q" = 1.41 "Gain" = 3.1 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 182 "Q" = 1.23 "Gain" = -2.3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 1066 "Q" = 2.57 "Gain" = -0.8 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 4038 "Q" = 3.6 "Gain" = 5 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                ]
            }
            capture.props = {
                # node.name   = "effect_input.eq-k371"
                media.class = Audio/Sink
				audio.channels = 2
				audio.position = [ FL FR ]
            }
            playback.props = {
                # node.name   = "effect_output.eq-k371"
				node.passive = true
				audio.channels = 2
				audio.position = [ FL FR ]
            }
        }
    }
]
