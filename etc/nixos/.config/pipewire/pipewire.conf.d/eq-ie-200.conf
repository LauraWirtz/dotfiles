# 6 band sink equalizer
#
# Copy this file into a conf.d/ directory such as
# ~/.config/pipewire/filter-chain.conf.d/
#
context.modules = [
    {name = libpipewire-module-filter-chain
        args = {
            node.description = "IE 200 EQ"
            media.name       = "IE 200 EQ"
            filter.graph = {
                nodes = [
                     {
                        type  = builtin
                        name  = eq_band_1
                        label = bq_peaking
                        control = { "Freq" = 25 "Q" = 0.5 "Gain" = 5.3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_2
                        label = bq_peaking
                        control = { "Freq" = 200 "Q" = 0.6 "Gain" = 0.2 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_3
                        label = bq_peaking
                        control = { "Freq" = 1700 "Q" = 1.5 "Gain" = -2 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_4
                        label = bq_peaking
                        control = { "Freq" = 3300 "Q" = 2 "Gain" = 1.2 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_5
                        label = bq_peaking
                        control = { "Freq" = 4400 "Q" = 1.4 "Gain" = 5.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_6
                        label = bq_peaking
                        control = { "Freq" = 6000 "Q" = 2 "Gain" = 3 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_7
                        label = bq_peaking
                        control = { "Freq" = 7800 "Q" = 2 "Gain" = -5.8 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_8
                        label = bq_peaking
                        control = { "Freq" = 11000 "Q" = 2 "Gain" = 4.5 }
                    }
                    {
                        type  = builtin
                        name  = eq_band_9
                        label = bq_peaking
                        control = { "Freq" = 15000 "Q" = 1.6 "Gain" = -12 }
                    }
                ]
                links = [
                    { output = "eq_band_1:Out" input = "eq_band_2:In" }
                    { output = "eq_band_2:Out" input = "eq_band_3:In" }
                    { output = "eq_band_3:Out" input = "eq_band_4:In" }
                    { output = "eq_band_4:Out" input = "eq_band_5:In" }
                    { output = "eq_band_5:Out" input = "eq_band_6:In" }
                    { output = "eq_band_6:Out" input = "eq_band_7:In" }
                    { output = "eq_band_7:Out" input = "eq_band_8:In" }
                    { output = "eq_band_8:Out" input = "eq_band_9:In" }
                ]
            }
            capture.props = {
                node.name   = "effect_input.eq"
                media.class = Audio/Sink
				audio.channels = 2
				audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "effect_output.eq"
				node.passive = false
				audio.channels = 2
				audio.position = [ FL FR ]
            }
        }
    }
]
