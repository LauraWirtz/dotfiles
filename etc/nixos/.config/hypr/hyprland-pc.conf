monitor=DP-1,highrr,0x0,1
monitor=DP-2,highres,2720x-1080,1
monitor=HDMI-A-1,highres,800x-1080,1

workspace=6, monitor:HDMI-A-1, default:true
workspace=1, monitor:DP-1, default:true
workspace=10, monitor:DP-2,default:true
workspace=5, monitor:DP-1, on-created-empty: steam %U
workspace=7, monitor:HDMI-A-1, on-created-empty: quodlibet

windowrulev2 = opaque, class:(floorp), workspace:6

exec-once = xrandr --output DP-1 --primary
