source = ~/.config/hypr/hyprland-specific.conf


exec-once = wpaperd -d
exec-once = fcitx5

$terminal = kitty
$fileManager = kitty ranger
$menu = fuzzel -f "Noto Sans Mono:size=12" -b eeeeeebb -s ffddeedd -x 20 -y 20 -B 2 -C 00000044 --line-height 26


env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx

cursor {
    no_hardware_cursors = true
}

input {
  numlock_by_default = true
  follow_mouse = 1
}
device {
  name = keychron-keychron-4k-link
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-4k-link-1
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-m4
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-m4-1
  sensitivity = -0.5
  accel_profile = flat
}
device {
  name = ymdk-idobao-x-ymdk-id75
  kb_layout = us
}
device {
  name = corsair-corsair-k70-rgb-mk.2-low-profile-mechanical-gaming-keyboard
  kb_layout = de
}


general {
  gaps_in = 10
  gaps_out = 0
  gaps_workspaces = 60
  border_size = 0

  layout = dwindle

  resize_on_border = true

  allow_tearing = false
}


decoration {
  rounding = 5
  blur {
    enabled = true
    size = 5
    passes = 3
    ignore_opacity = true
	vibrancy = 0
	noise = 0.4
	brightness = 1
	special = true
  }
  inactive_opacity=0.85
  dim_inactive = true
  dim_strength = 0.1
  drop_shadow = yes
  shadow_range = 10
  shadow_render_power = 2
  col.shadow = rgba(00000066)
}
animations {
  enabled = yes
  bezier = easeInOut, 0.2, 0.1, 0.2, 1
  animation = global, 1, 3, easeInOut
  animation = workspaces, 1, 3, easeInOut, slidevert
}


dwindle {
#  preserve_split = yes # you probably want this
#  smart_split = true
  split_width_multiplier = 1.25
  no_gaps_when_only = 0
}


misc {
  vrr = 1
}

binds {
  scroll_event_delay = 2
  workspace_center_on = 1
  focus_preferred_method = 1
}


windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent minimize, class:.*
windowrulev2 = opaque, class:(floorp), title:^(.*- YouTube.*)$
windowrulev2 = nodim, class:(floorp), title:^(.*- YouTube.*)$

workspace=special:magic, gapsout:15


layerrule = blur, launcher
layerrule = ignorezero, launcher


$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, O, swapsplit, # dwindle

bind = $mainMod, 1, exec, hyprshade off
bind = $mainMod, 2, exec, hyprshade on bluelight5100
bind = $mainMod, 3, exec, hyprshade on bluelight3700
bind = $mainMod, 4, exec, hyprshade on bluelight2300

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Move windows to monitor
bind = $mainMod ALT, left, movewindow, mon:l
bind = $mainMod ALT, right, movewindow, mon:r
bind = $mainMod ALT, up, movewindow, mon:u
bind = $mainMod ALT, down, movewindow, mon:d

bind = $mainMod CTRL, up, exec, hyprnome -p
bind = $mainMod CTRL, down, exec, hyprnome
bind = $mainMod CTRL SHIFT, up, exec, hyprnome -pm
bind = $mainMod CTRL SHIFT, down, exec, hyprnome -m

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bind = $mainMod, mouse_up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

