monitor=DP-1,highrr,0x0,1
monitor=DP-2,1920x1080@60,2720x-1080,1
monitor=HDMI-A-1,1920x1080@60,800x-1080,1

workspace=6, monitor:HDMI-A-1, default:true
workspace=1, monitor:DP-1, default:true
workspace=10, monitor:DP-2,default:true
workspace=5, monitor:DP-1, on-created-empty: steam %U
workspace=7, monitor:HDMI-A-1, on-created-empty: quodLibet


exec-once = wpaperd
exec-once = fcitx5
exec-once = hyprlock

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf


$terminal = kitty
$fileManager = kitty ranger
$menu = fuzzel -f "Noto Sans Mono" -b eeeeeebb -sffddeebb

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
env = WLR_NO_HARDWARE_CURSORS,1
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx

input {
    kb_layout = us
    numlock_by_default = true

    follow_mouse = 1

    sensitivity = -0.5
    accel_profile = flat
}

general {
    gaps_in = 20
    gaps_out = 40
    border_size = 0

    layout = dwindle

    allow_tearing = false
}

decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 6
        passes = 3
        #brightness = 0.8
        ignore_opacity = true
    }

    inactive_opacity=0.8
    drop_shadow = yes
    shadow_range = 12
    shadow_render_power = 3
    col.shadow = rgba(00000088)
}

animations {
    enabled = yes

    bezier = easeInOut, 0.2, 0.1, 0.2, 1

    animation = global, 1, 4, easeInOut
    animation = workspaces, 1, 4, easeInOut, slidevert
}

dwindle {
#    preserve_split = yes # you probably want this
#    smart_split = true
    split_width_multiplier = 1.25
}

master {
    new_is_master = true
}

misc {
#    vrr = 1
}


windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent minimize, class:.*

layerrule = blur, launcher

windowrulev2 = opaque, class:(firefox), workspace:6


$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
#bind = $mainMod, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, code:174, exec, hyprshade off
bind = $mainMod, code:172, exec, hyprshade on bluelight5100
bind = $mainMod, code:173, exec, hyprshade on bluelight3700
bind = $mainMod, code:171, exec, hyprshade on bluelight2300

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, mouse_up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

