source = ~/.config/hypr/hyprland-specific.conf


exec-once = wpaperd
exec-once = fcitx5
exec-once = hypridle

$terminal = kitty
$fileManager = kitty ranger
$menu = fuzzel -f "Noto Sans Mono:size=12" -b eeeeeebb -s ffddeedd -x 20 -y 20 -B 2 -C 00000044 --line-height 26


env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = WLR_NO_HARDWARE_CURSORS,1
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx


input {
  numlock_by_default = true
  follow_mouse = 1
}
device {
  name = keychron-keychron-4k-link
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-4k-link-1
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-m4
  sensitivity = -0.5
  accel_profile = flat
}
device {
 name = keychron-keychron-m4-1
  sensitivity = -0.5
  accel_profile = flat
}
device {
  name = ymdk-idobao-x-ymdk-id75
  kb_layout = us
}


general {
  gaps_in = 15
  gaps_out = 30
  border_size = 0

  layout = dwindle

  allow_tearing = false
}


decoration {
  rounding = 10 
  blur {
    enabled = true
    size = 3
    passes = 3
    ignore_opacity = true
  }
  inactive_opacity=0.75
  drop_shadow = yes
  shadow_range = 20
  shadow_render_power = 2
  col.shadow = rgba(00000066)
}
animations {
  enabled = yes
  bezier = easeInOut, 0.2, 0.1, 0.2, 1
  animation = global, 1, 3, easeInOut
  animation = workspaces, 1, 3, easeInOut, slidevert
}


dwindle {
#  preserve_split = yes # you probably want this
#  smart_split = true
  split_width_multiplier = 1.25
}
master {
  new_is_master = true
}


misc {
  vrr = 1
}

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent minimize, class:.*

layerrule = blur, launcher
layerrule = ignorezero, launcher


$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
#bind = $mainMod, M, setfloating, true
bind = $mainMod, M, togglefloating
bind = $mainMod, M, moveactive, exact 765 30
bind = $mainMod, M, resizeactive, exact 1840 1380
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, code:174, exec, hyprshade off
bind = $mainMod, code:172, exec, hyprshade on bluelight5100
bind = $mainMod, code:173, exec, hyprshade on bluelight3700
bind = $mainMod, code:171, exec, hyprshade on bluelight2300

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = $mainMod, mouse_up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

