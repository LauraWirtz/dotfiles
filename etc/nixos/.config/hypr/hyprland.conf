source = ~/.config/hypr/hyprland-specific.conf

$terminal = kitty
$fileManager = dolphin
$menu = fuzzel -f "Noto Sans Mono:size=12" -b eeeeeeee -s ffddeeee -x 20 -y 20 -B 2 -C 00000044 --line-height 26
$screen_lock = swaylock -e -i /home/laura/Pictures/wallpapers/66035612_p0.png --bs-hl-color ff0000ff --indicator-idle-visible --indicator-radius 100 --inside-color 00000000 --key-hl-color ffffffff --ring-color bbbbbbff

env = XCURSOR_SIZE,32
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XDG_MENU_PREFIX,plasma-

exec-once = wpaperd -d
exec-once = fcitx5
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE
exec-once = /run/current-system/sw/libexec/polkit-kde-authentication-agent-1


input {
	numlock_by_default = true
	follow_mouse = 1
}
device {
	name = keychron-keychron-4k-link
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-4k-link-1
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-m4
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-m4-mouse
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-m4-1
	sensitivity = -0.5
	accel_profile = flat
}
device {
	name = ymdk-idobao-x-ymdk-id75
	kb_layout = us
}
device {
	name = corsair-corsair-k70-rgb-mk.2-low-profile-mechanical-gaming-keyboard
	kb_layout = de
}


general {
	gaps_in = 10
	gaps_out = 20
	gaps_workspaces = 60
	border_size = 0

	layout = dwindle

	resize_on_border = true

	allow_tearing = false
}


decoration {
	rounding = 10
	blur {
		enabled = true
		size = 5
		passes = 3
		ignore_opacity = true
	vibrancy = 0
	contrast = 1
	noise = 0
	brightness = 1
	special = false
	}
		inactive_opacity= 0.8
		dim_inactive = false
		dim_strength = 0.1
		shadow {
		enabled = yes
		range = 8
		render_power = 1
		color = rgba(00000066)
		color_inactive = rgba(00000044)
		offset = 2, 2
	}
}


animations {
	enabled = yes
	bezier = easeInOut, 0.2, 0.1, 0.2, 1
	animation = global, 1, 3, easeInOut
	animation = workspaces, 1, 3, easeInOut, slidevert
}


dwindle {
#	preserve_split = yes # you probably want this
#	smart_split = true
	split_width_multiplier = 1.25
}

group {
	drag_into_group = 2
	groupbar {
		font_size = 12
		gradients = true
		height = 20
		text_color = 0xff000000
		col.active = 0xffffffff
		col.inactive = 0xbbffffff
	}
}


misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	vrr = 2
}
opengl {
	nvidia_anti_flicker = false
}
render {
	explicit_sync = 1
	explicit_sync_kms = 1
	direct_scanout = true
}


binds {
	scroll_event_delay = 2
	workspace_center_on = 1
	focus_preferred_method = 1
}


cursor {
	default_monitor = desc:LG Electronics LG ULTRAGEAR 011NTYT3V010
}

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent minimize, class:.*

#video sites are always opaque
windowrulev2 = opaque, class:(floorp), title:^(.*- YouTube.*)$
windowrulev2 = nodim, class:(floorp), title:^(.*- YouTube.*)$
windowrulev2 = opaque, class:(floorp), title:^(.*- Twitch.*)$
windowrulev2 = nodim, class:(floorp), title:^(.*- Twitch.*)$

#Musicbee tooltips dont get focus
windowrulev2 = nofocus on, class:(steam_proton), title:^$


workspace=special:magic, gapsout:15


layerrule = blur, launcher
layerrule = ignorezero, launcher


$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, L, exec, $screen_lock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, O, swapsplit, # dwindle
bind = $mainMod, T, exec, gammastep -l 51.3:6.2 -b 1:0.4 -t 5700:4000
bind = $mainMod SHIFT, T, exec, pkill gammastep

bind = $mainMod, TAB, togglegroup,
bind = $mainMod SHIFT, TAB, moveoutofgroup,

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# Move windows to monitor
bind = $mainMod ALT, left, movewindow, mon:l
bind = $mainMod ALT, right, movewindow, mon:r
bind = $mainMod ALT, up, movewindow, mon:u
bind = $mainMod ALT, down, movewindow, mon:d

bind = $mainMod CTRL, up, exec, hyprnome -p
bind = $mainMod CTRL, down, exec, hyprnome
bind = $mainMod CTRL SHIFT, up, exec, hyprnome -pm
bind = $mainMod CTRL SHIFT, down, exec, hyprnome -m

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

#bind = $mainMod, mouse_down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
#bind = $mainMod, mouse_up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

