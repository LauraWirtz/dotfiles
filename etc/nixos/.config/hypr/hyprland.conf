$terminal = kitty
$fileManager = dolphin
$menu = fuzzel -f "Noto Sans Mono:size=12" -b eeeeeeee -s ffddeeee -x 20 -y 20 -B 2 -C 00000044 --line-height 26
$screen_lock = swaylock -e -i /home/laura/Pictures/wallpapers/66035612_p0.png --bs-hl-color ff0000ff --indicator-idle-visible --indicator-radius 100 --inside-color 00000000 --key-hl-color ffffffff --ring-color bbbbbbff

env = QT_QPA_PLATFORMTHEME,qt6ct
env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx
env = XDG_MENU_PREFIX,plasma-

source = ~/.config/hypr/hyprland-specific.conf

exec-once = wpaperd -d
exec-once = fcitx5
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE

exec-once = hypridle

input {
	numlock_by_default = true
	follow_mouse = 1
	follow_mouse_threshold = 20
}
device {
	name = keychron-keychron-4k-link
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-4k-link-1
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-m4
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-m4-mouse
	sensitivity = -0.5
	accel_profile = flat
}
device {
 name = keychron-keychron-m4-1
	sensitivity = -0.5
	accel_profile = flat
}
device {
	name = ymdk-idobao-x-ymdk-id75
	kb_layout = us
}
device {
	name = corsair-corsair-k70-rgb-mk.2-low-profile-mechanical-gaming-keyboard
	kb_layout = de
}


general {
	gaps_in = 15
	gaps_out = 20
	gaps_workspaces = 60
	border_size = 0

	layout = dwindle

	resize_on_border = true

	allow_tearing = false
}


decoration {
	rounding = 10
	blur {
		enabled = true
		size = 3
		passes = 3
		ignore_opacity = true
		vibrancy = 0
		contrast = 1
		noise = 0
		brightness = 1
		special = true
	}
		inactive_opacity= 0.75
		shadow {
			enabled = yes
			range = 15
			render_power = 2
			color = rgba(00000055)
			color_inactive = rgba(00000044)
			offset = 2, 4
		}
}


animations {
	enabled = yes
	bezier = easeInOut, 0.2, 0.1, 0.2, 1
	animation = global, 1, 3, easeInOut
	animation = workspaces, 1, 3, easeInOut, slidevert
}


dwindle {
#	preserve_split = yes # you probably want this
#	smart_split = true
	split_width_multiplier = 1.25
}


group {
	drag_into_group = 2
	groupbar {
		font_size = 16
		gradients = true
		gradient_rounding = 6
		gradient_round_only_edges = false
		gaps_in = 10
		gaps_out = 10
		keep_upper_gap = false
		indicator_height = 0
		height = 30
		text_color = 0xff000000
		col.active = 0xffffffff
		col.inactive = 0xbbffffff
	}
}


misc {
	disable_hyprland_logo = true
	disable_splash_rendering = true
	vrr = 2
	enable_anr_dialog = false
}


binds {
	scroll_event_delay = 10
	workspace_center_on = 0
	focus_preferred_method = 1
}


cursor {
	no_break_fs_vrr = 1
	min_refresh_rate = 48
}

ecosystem {
	no_update_news = true
	no_donation_nag = true
}


windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = suppressevent minimize, class:.*

#video sites are always opaque
windowrulev2 = opaque, class:(floorp), title:^(.*- YouTube.*)$
windowrulev2 = nodim, class:(floorp), title:^(.*- YouTube.*)$
windowrulev2 = opaque, class:(floorp), title:^(.*- Twitch.*)$
windowrulev2 = nodim, class:(floorp), title:^(.*- Twitch.*)$

#Musicbee tooltips dont get focus
windowrulev2 = nofocus 1, class:(steam_proton), title:^$
#Musicbee gets tiled
windowrulev2 = tile, class:(steam_proton), initialTitle:^.+$


windowrulev2 = nofocus on, initialTitle:^(Anki)$
windowrulev2 = opaque, initialTitle:^(Anki)$
windowrulev2 = rounding 0, initialTitle:^(Anki)$

workspace = special:magic, gapsout:20

layerrule = blur, launcher
layerrule = ignorezero, launcher


$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, L, exec, $screen_lock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, O, swapsplit, # dwindle

bind = $mainMod, G, dpms, toggle HDMI-A-1
bind = $mainMod, G, dpms, toggle HDMI-A-2

bind = $mainMod, F, fullscreen, 0

bind = $mainMod, TAB, togglegroup,
bind = $mainMod SHIFT, TAB, moveoutofgroup,


bind = $mainMod, up, exec, hyprnome -p
bind = $mainMod, down, exec,  hyprnome
bind = $mainMod SHIFT, up, exec, hyprnome -pm
bind = $mainMod SHIFT, down, exec,  hyprnome -m

bind = $mainMod, mouse_down, exec, hyprnome -p
bind = $mainMod, mouse_up, exec,  hyprnome
bind = $mainMod SHIFT, mouse_down, exec, hyprnome -pm
bind = $mainMod SHIFT, mouse_up, exec,  hyprnome -m


# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod ALT SHIFT, S, movetoworkspace, m+0

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

